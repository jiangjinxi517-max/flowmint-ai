services:
  - type: web
    name: flowmint-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT
    envVars:
      - key: FLASK_ENV
        value: production
      - key: NOTIFY_EMAIL
        sync: false
      - key: GMAIL_APP_PASS
        sync: false
